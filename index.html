<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delivery Hub</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #00ff88;
    }

    .pedido {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      border-left: 5px solid #00ff88;
    }

    button {
      background: #00ff88;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div style="background:#1a1a1a;padding:15px;border-radius:10px;margin-bottom:20px;">

    <h2>Integrações</h2>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;">

      <button onclick="conectarIFood()">
        Conectar iFood
      </button>

      <button onclick="conectar99Food()">
        Conectar 99Food
      </button>

      <button onclick="conectarKeeta()">
        Conectar Keeta
      </button>

    </div>

    <div id="statusIntegracao" style="margin-top:15px;color:#00ff88;font-weight:bold;"></div>

  </div>

  <div class="topo">
    <h1>DELIVERY HUB</h1>

    <button onclick="novoPedido()">
      Simular Pedido
    </button>
  </div>

  <div id="pedidos"></div>

  <script>

    let pedidos = [];

    function novoPedido() {

      const plataformas = [
        'IFOOD',
        '99FOOD',
        'KEETA'
      ];

      const clientes = [
        'João',
        'Maria',
        'Carlos',
        'Fernanda'
      ];

      const itens = [
        'X-Burger',
        'Tapioca',
        'Açaí',
        'Churros'
      ];

      const pedido = {
        id: Date.now(),
        plataforma: plataformas[Math.floor(Math.random() * plataformas.length)],
        cliente: clientes[Math.floor(Math.random() * clientes.length)],
        item: itens[Math.floor(Math.random() * itens.length)],
        valor: (Math.random() * 50 + 10).toFixed(2),
        status: 'NOVO PEDIDO'
      };

      pedidos.unshift(pedido);

      renderPedidos();

      tocarSom();

      imprimirPedido(pedido);
    }

    function renderPedidos() {

      const div = document.getElementById('pedidos');

      div.innerHTML = '';

      pedidos.forEach((pedido) => {

        div.innerHTML += `
          <div class="pedido">
            <h2>${pedido.plataforma}</h2>

            <p><b>Cliente:</b> ${pedido.cliente}</p>

            <p><b>Item:</b> ${pedido.item}</p>

            <p><b>Valor:</b> R$ ${pedido.valor}</p>

            <p><b>Status:</b> ${pedido.status}</p>

            <button onclick="window.print()">
              Imprimir Pedido
            </button>
          </div>
        `;
      });
    }

    function tocarSom() {
      const audio = new Audio(
        'https://www.soundjay.com/buttons/sounds/button-3.mp3'
      );

      audio.play();
    }

    function imprimirPedido(pedido) {
      console.log('Imprimindo pedido...', pedido);
    }

    function conectarIFood() {
      document.getElementById('statusIntegracao').innerHTML =
        '✅ iFood conectado com sucesso';
    }

    function conectar99Food() {
      document.getElementById('statusIntegracao').innerHTML =
        '✅ 99Food conectado com sucesso';
    }

    function conectarKeeta() {
      document.getElementById('statusIntegracao').innerHTML =
        '✅ Keeta conectado com sucesso';
    }

  </script>

</body>
</html>
